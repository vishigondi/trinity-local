<!doctype html>
<!--
  Trinity Local — toolbar popup.

  The ONLY extension-specific UI. The extension's duplicate
  launchpad.html was removed; the popup dispatches `open-launchpad`
  via Native Messaging, which runs `trinity-local portal-html
  --open-browser` and opens the single canonical file:// launchpad.

  Visual language matches src/trinity_local/design_system.py:
  cream BG, sage action color, Iowan Old Style serif headline,
  SF Pro Text body. Council input is a multi-line textarea so a
  real question fits.

  When the user fires a council, the popup transitions to a status
  panel that mirrors the launchpad's running-council surface:
  rotating loading copy + per-member status chips + synthesis row,
  fed by polling capture_host's in-process `get-council-status`
  handler. See popup.js for the polling loop.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Trinity</title>
  <style>
    :root {
      --bg-base: #f5efe3;
      --bg-wash: #ece4d6;
      --surface: #fbf8f2;
      --border: #d7ccb9;
      --text-primary: #1f1a17;
      --text-secondary: #5f554d;
      --text-muted: #86796d;
      --action: #255847;
      --action-hover: #1d4638;
      --action-text: #f7f3ea;
      --success: #2d6a4f;
      --warning: #b26a1f;
      --info: #315c85;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: "SF Pro Text", "Segoe UI", system-ui, -apple-system, sans-serif;
      line-height: 1.5;
      font-size: 14px;
    }
    body {
      width: 440px;
      padding: 18px 18px 16px;
    }
    h1 {
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, Georgia, serif;
      font-size: 22px;
      font-weight: 700;
      line-height: 1.1;
      margin: 0 0 14px 0;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }
    .field-group { margin-bottom: 14px; }
    .field-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.02em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    textarea#task {
      width: 100%;
      min-height: 64px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--surface);
      font-family: inherit;
      font-size: 14px;
      line-height: 1.5;
      color: var(--text-primary);
      resize: vertical;
    }
    textarea#task:focus {
      outline: none;
      border-color: var(--action);
      box-shadow: 0 0 0 3px rgba(37, 88, 71, 0.12);
    }
    textarea#task::placeholder { color: var(--text-muted); }
    .btn {
      display: inline-block;
      width: 100%;
      padding: 10px 14px;
      border: none;
      border-radius: 5px;
      background: var(--action);
      color: var(--action-text);
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: background 0.12s ease;
    }
    .btn:hover { background: var(--action-hover); }
    .btn:disabled { opacity: 0.55; cursor: default; }
    /* Panel-action buttons must not wrap their label mid-button —
       "Open council page" is two words too long for the 380px popup
       when split across two flex children, so the popup is widened
       to 440px AND labels are kept single-line. */
    .panel-actions .btn { white-space: nowrap; }
    .btn.secondary {
      background: transparent;
      color: var(--action);
      border: 1px solid var(--border);
    }
    .btn.secondary:hover {
      background: rgba(37, 88, 71, 0.06);
      border-color: var(--action);
    }
    .status {
      font-size: 12.5px;
      color: var(--text-muted);
      margin: 8px 0 0 0;
      min-height: 16px;
      white-space: pre-wrap;
      line-height: 1.4;
    }
    .status.error { color: var(--warning); }
    .status.ok    { color: var(--success); }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 18px 0 16px;
      opacity: 0.6;
    }

    /* Running-council status panel — mirrors the launchpad's running
       surface inside the 380px popup. Rotating tip line on top, then a
       row per member with a colored status dot, then the synthesis row.
       Same vocabulary as the launchpad (Queued/Running/Done/Failed). */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px 14px 12px;
      position: relative;
    }
    .panel-close {
      position: absolute;
      top: 6px; right: 8px;
      width: 24px; height: 24px;
      padding: 0;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      border-radius: 4px;
    }
    .panel-close:hover {
      background: var(--bg-wash);
      color: var(--text-primary);
    }
    .panel-title {
      font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
      font-size: 16px;
      font-weight: 700;
      margin: 0 0 4px 0;
      letter-spacing: -0.005em;
    }
    .panel-tip {
      font-size: 13px;
      color: var(--text-secondary);
      margin: 0 0 12px 0;
      min-height: 18px;
      font-style: italic;
    }
    .member-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      font-size: 13px;
      border-top: 1px solid rgba(215, 204, 185, 0.5);
    }
    .member-row:first-of-type { border-top: none; }
    .member-row .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex: 0 0 8px;
      background: var(--text-muted);
    }
    .member-row .dot.pending { background: #c8bca8; }
    .member-row .dot.running {
      background: var(--info);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .member-row .dot.done    { background: var(--success); }
    .member-row .dot.failed  { background: var(--warning); }
    .member-row .name { flex: 1 1 auto; color: var(--text-primary); }
    .member-row .pill {
      font-size: 11px;
      letter-spacing: 0.02em;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .member-row .pill.done   { color: var(--success); }
    .member-row .pill.failed { color: var(--warning); }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.35; }
    }

    .panel-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .panel-actions .btn { flex: 1 1 0; }

    /* Setup card — shown when Native Messaging host missing or
       CLI not on PATH. Same visual language as the rest of the popup
       so the install-first experience doesn't feel like a different
       app. */
    .setup-reason {
      font-size: 13px;
      color: var(--text-secondary);
      margin: 0 0 14px 0;
      padding: 10px 12px;
      background: var(--bg-wash);
      border-left: 3px solid var(--warning);
      border-radius: 3px;
      line-height: 1.45;
    }
    .setup-step {
      font-size: 13.5px;
      margin: 12px 0 6px 0;
      color: var(--text-primary);
      line-height: 1.45;
    }
    #copy-setup-brief,
    #copy-setup-cmds { margin: 4px 0 0 0; }
    .setup-footer {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 16px;
      text-align: right;
    }
    .setup-footer a { color: var(--info); text-decoration: none; }
    .setup-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div id="compose">
    <h1>Trinity Local</h1>

    <div class="field-group">
      <label for="task">Run a quick council</label>
      <textarea id="task" rows="2"
                placeholder="Ask the same question across Claude, Codex, and Gemini. Chairman synthesizes in your voice."
                autofocus></textarea>
    </div>
    <button class="btn" id="run-btn">Send to council</button>
    <div class="status" id="status"></div>

    <div class="divider"></div>

    <button class="btn secondary" id="open-launchpad-btn">Open Trinity launchpad →</button>
  </div>

  <!-- Status panel — hidden until a council launches. Replaces #compose.
       Button labels mirror the launchpad's operation-actions exactly
       (Open council page / Stop council / Dismiss when finished). The
       ✕ in the corner is a popup-specific affordance — closes the
       popup without stopping the council (which keeps running headless,
       since we Popen'd with start_new_session). -->
  <div id="status-panel" class="panel" style="display:none">
    <button class="panel-close" id="panel-close-btn" title="Close popup (council keeps running)">×</button>
    <div class="panel-title" id="panel-title">Council running</div>
    <div class="panel-tip" id="panel-tip">Reticulating splines...</div>
    <div id="member-rows"></div>
    <div class="panel-actions">
      <button class="btn secondary" id="panel-open-btn">Open council page</button>
      <button class="btn secondary" id="panel-stop-btn">Stop council</button>
      <button class="btn secondary" id="panel-dismiss-btn" style="display:none">Dismiss</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
